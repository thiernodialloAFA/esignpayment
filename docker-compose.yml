version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: esignpay-db
    environment:
      POSTGRES_DB: esignpayment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    container_name: esignpay-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: esignpay-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/esignpayment-realm.json:/opt/keycloak/data/import/esignpayment-realm.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    command:
      - start-dev
      - --import-realm

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: esignpay-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (collector)
      - "8889:8889"   # Prometheus exporter metrics

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esignpay-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: esignpayment
      DB_USER: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/esignpayment/protocol/openid-connect/certs
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SAMPLING_PROBABILITY: 1.0
      FRONTEND_URL: http://localhost:3000
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
        REACT_APP_KEYCLOAK_URL: http://localhost:9090
        REACT_APP_KEYCLOAK_REALM: esignpayment
        REACT_APP_KEYCLOAK_CLIENT_ID: esignpay-frontend
    container_name: esignpay-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  mailpit:
    image: axllent/mailpit:latest
    container_name: esignpay-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  keycloak_postgres_data:
  uploads:
