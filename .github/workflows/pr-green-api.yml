name: "🌿 Esign Green API Score CI"

on:
  push:
    branches: [main, master, develop, feat/devoxx]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pr-green-api-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  build:
    name: "🔨 Build Backend "
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build backend
        run: mvn -q -DskipTests -f backend/pom.xml package
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  green-score:
    name: "🌿 Green Score Analysis"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/
      - name: Start backend (H2 in-memory, no Keycloak)
        run: |
          nohup java -jar backend/target/*.jar \
            --spring.profiles.active=test \
            --server.port=8080 \
            > backend.log 2>&1 &
          echo $! > backend.pid
      - name: Wait for backend
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 90); do
            if curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "✅ Backend is up"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "❌ Backend failed to start"
              cat backend.log
              exit 1
            fi
            sleep 2
          done
      - name: Verify Swagger is exposed
        run: |
          echo "Checking Swagger endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v3/api-docs)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Swagger spec available at /api/v3/api-docs"
            curl -s http://localhost:8080/api/v3/api-docs | python3 -c "
          import sys, json
          spec = json.load(sys.stdin)
          paths = list(spec.get('paths', {}).keys())
          print(f'  OpenAPI version: {spec.get(\"openapi\", \"?\")}')
          print(f'  Title: {spec.get(\"info\", {}).get(\"title\", \"?\")}')
          print(f'  Endpoints: {len(paths)}')
          for p in paths[:10]:
              print(f'    {p}')
          if len(paths) > 10:
              print(f'    ... and {len(paths) - 10} more')
          "
          else
            echo "❌ Swagger not available (HTTP $STATUS)"
            cat backend.log | tail -50
            exit 1
          fi

      - name: Run Green API Auto-Discover Analyzer
        run: |
          python3 scripts/green-api-auto-discover.py \
            --target http://localhost:8080 \
            --swagger http://localhost:8080/api/v3/api-docs \
            --repeat 3 \
            --skip-spectral

      - name: Generate Green Score badge
        run: |
          chmod +x scripts/generate-badge.sh
          bash scripts/generate-badge.sh reports/latest-report.json badges/green-score.svg || true

      - name: Generate Dashboard
        run: |
          chmod +x scripts/generate-dashboard.sh
          bash scripts/generate-dashboard.sh reports/latest-report.json dashboard/index.save.html dashboard/index.html || true

      - name: Assertions — Green Score
        shell: bash
        run: |
          set -e
          REPORT="reports/latest-report.json"

          if [ ! -f "$REPORT" ]; then
            echo "❌ ERROR: Report file not found: $REPORT"
            ls -la reports/ || true
            exit 1
          fi
          if [ ! -s "$REPORT" ]; then
            echo "❌ ERROR: Report file is empty"
            exit 1
          fi

          echo "=== Green Score Report ==="
          python3 -c "
          import json
          r = json.load(open('$REPORT'))
          rpt = r.get('report', r)
          print(json.dumps(rpt.get('green_score', {}), indent=2))
          disc = rpt.get('auto_discovery', {})
          print(f'Endpoints discovered: {disc.get(\"endpoints_discovered\", 0)}')
          print(f'Endpoints measured: {disc.get(\"endpoints_measured\", 0)}')
          "

          TOTAL=$(python3 -c "import json;r=json.load(open('$REPORT'));rpt=r.get('report',r);print(rpt['green_score']['total'])")
          GRADE=$(python3 -c "import json;r=json.load(open('$REPORT'));rpt=r.get('report',r);print(rpt['green_score']['grade'])")
          EP_COUNT=$(python3 -c "import json;r=json.load(open('$REPORT'));rpt=r.get('report',r);print(rpt.get('auto_discovery',{}).get('endpoints_discovered',0))")

          echo "## 🌿 Green Score: ${TOTAL}/100 (Grade: ${GRADE})" >> $GITHUB_STEP_SUMMARY
          echo "Endpoints discovered: ${EP_COUNT}" >> $GITHUB_STEP_SUMMARY

          # Assert endpoints were discovered from Swagger
          python3 -c "
          import json
          r = json.load(open('$REPORT'))
          rpt = r.get('report', r)
          ep = rpt.get('auto_discovery', {}).get('endpoints_discovered', 0)
          assert ep > 0, f'FAIL: no endpoints discovered (got {ep})'
          print(f'✅ Discovered {ep} endpoints from Swagger')
          "

          # Assert Green Score is reasonable (>= 5, meaning at least actuator/health works)
          python3 -c "
          total = $TOTAL
          assert total >= 5, f'FAIL: Green Score {total} < 5'
          print(f'✅ Green Score {total}/100 — PASSED')
          "

          # Regression gate (optional)
          if [ -f green-score-threshold.json ]; then
            MIN_SCORE=$(python3 -c "import json;print(json.load(open('green-score-threshold.json'))['minScore'])")
            echo "Min score threshold: ${MIN_SCORE}" >> $GITHUB_STEP_SUMMARY
            python3 -c "total=$TOTAL; minimum=$MIN_SCORE; assert total >= minimum, f'FAIL: Green Score {total} < threshold {minimum}'; print('✅ Green Score threshold PASSED')"
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: green-score-report
          path: reports/

      - name: Upload badge
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: green-score-badge
          path: badges/

      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: green-score-dashboard
          path: |
            dashboard/index.html
            dashboard/index.md

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: backend.log

      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) 2>/dev/null || true

  creedengo:
    name: "🌱 Creedengo Eco-Design Analysis"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/
      - name: Compile backend (for sonar binaries)
        run: mvn -q -DskipTests -f backend/pom.xml compile

      - name: Auto-detect stack & download plugins
        run: |
          CREEDENGO_VERSION="1.7.0"

          echo "🔍 Detecting project stack..."
          DETECT_JSON=$(python3 scripts/creedengo-detect-stack.py . --json)
          echo "$DETECT_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  Languages:  {d[\"languages\"]}')
          print(f'  Primary:    {d[\"primary_language\"]} ({d[\"primary_framework\"]})')
          print(f'  Plugins:    {d[\"creedengo_plugins\"]}')
          print(f'  Scanner:    {d[\"sonar_scanner\"]}')
          "

          PLUGINS=$(echo "$DETECT_JSON" | python3 -c "import sys,json; print(','.join(json.load(sys.stdin)['creedengo_plugins']))")
          echo "DETECTED_PLUGINS=$PLUGINS" >> $GITHUB_ENV
          echo "DETECT_JSON<<DETECT_EOF" >> $GITHUB_ENV
          echo "$DETECT_JSON" >> $GITHUB_ENV
          echo "DETECT_EOF" >> $GITHUB_ENV

          # Download plugins
          PLUGIN_DIR=".creedengo/plugins"
          mkdir -p "$PLUGIN_DIR"
          IFS=',' read -ra PLUGIN_ARRAY <<< "$PLUGINS"
          for pk in "${PLUGIN_ARRAY[@]}"; do
            echo "  📥 Downloading creedengo-${pk}..."
            JAR="$PLUGIN_DIR/creedengo-${pk}-plugin-${CREEDENGO_VERSION}.jar"
            DOWNLOADED=false
            for url in \
              "https://github.com/green-code-initiative/creedengo-${pk}/releases/download/${CREEDENGO_VERSION}/creedengo-${pk}-plugin-${CREEDENGO_VERSION}.jar" \
              "https://github.com/green-code-initiative/creedengo-${pk}/releases/download/v${CREEDENGO_VERSION}/creedengo-${pk}-plugin-${CREEDENGO_VERSION}.jar" \
              "https://github.com/green-code-initiative/ecoCode-${pk}/releases/download/${CREEDENGO_VERSION}/ecocode-${pk}-plugin-${CREEDENGO_VERSION}.jar"; do
              if curl -fsSL -o "$JAR" "$url" 2>/dev/null; then
                DOWNLOADED=true
                echo "  ✅ ${pk}: downloaded"
                break
              fi
            done
            [ "$DOWNLOADED" = false ] && echo "  ⚠️ ${pk}: could not download" && rm -f "$JAR"
          done

          ls -la "$PLUGIN_DIR"/ || true

          # Check if at least one plugin was downloaded
          if [ -z "$(ls "$PLUGIN_DIR"/*.jar 2>/dev/null)" ]; then
            echo "⚠️ No plugins downloaded — generating empty report"
            mkdir -p reports
            echo '{"creedengo_score":{"total":100,"max":100,"grade":"A+","issues_count":0,"severity_breakdown":{},"total_effort":"0min","total_effort_minutes":0},"rules_summary":[],"categories":[],"top_files":[],"issues":[],"all_creedengo_rules":0,"rules_violated":0,"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","language":"java","analyzer":"creedengo","project":"esign-payment-backend"}' > reports/creedengo-report.json
            echo "CREEDENGO_SKIP=true" >> $GITHUB_ENV
          fi

      - name: Start SonarQube with Creedengo
        if: env.CREEDENGO_SKIP != 'true'
        run: |
          SONAR_PORT=9100
          docker run -d \
            --name creedengo-sonar \
            -p ${SONAR_PORT}:9000 \
            -v "$(pwd)/.creedengo/plugins:/opt/sonarqube/extensions/plugins:ro" \
            -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true \
            -e SONAR_SEARCH_JAVAADDITIONALOPTS="-Dnode.store.allow_mmap=false" \
            sonarqube:lts-community

          echo "⏳ Waiting for SonarQube to start..."
          for i in $(seq 1 120); do
            STATUS=$(curl -s "http://localhost:${SONAR_PORT}/api/system/status" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "✅ SonarQube is ready ($((i*2))s)"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "❌ SonarQube failed to start"
              docker logs creedengo-sonar 2>&1 | tail -40
              exit 1
            fi
            sleep 2
          done

      - name: Configure SonarQube & activate rules
        if: env.CREEDENGO_SKIP != 'true'
        run: |
          SONAR_URL="http://localhost:9100"
          SONAR_PASS="creedengo2026"

          # Change default password
          curl -s -o /dev/null -u admin:admin -X POST \
            "${SONAR_URL}/api/users/change_password" \
            -d "login=admin&previousPassword=admin&password=${SONAR_PASS}" 2>/dev/null || true

          # Test auth
          if ! curl -s -u "admin:${SONAR_PASS}" "${SONAR_URL}/api/system/status" 2>/dev/null | grep -q "UP"; then
            SONAR_PASS="admin"
          fi

          # Generate token
          TOKEN=$(curl -s -u "admin:${SONAR_PASS}" -X POST \
            "${SONAR_URL}/api/user_tokens/generate" \
            -d "name=ci-scan-$(date +%s)" 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" 2>/dev/null || echo "")

          if [ -n "$TOKEN" ]; then
            echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV
            AUTH_FLAG="-u ${TOKEN}:"
          else
            echo "SONAR_USER=admin" >> $GITHUB_ENV
            echo "SONAR_PASSWORD=$SONAR_PASS" >> $GITHUB_ENV
            AUTH_FLAG="-u admin:${SONAR_PASS}"
          fi

          sleep 3

          # Activate Creedengo rules for all detected language repos
          echo "$DETECT_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          plugins = d.get('creedengo_plugins', [])
          catalog = {
              'java':       {'repo': 'creedengo-java',       'lang': 'java'},
              'python':     {'repo': 'creedengo-python',     'lang': 'py'},
              'javascript': {'repo': 'creedengo-javascript', 'lang': 'js'},
              'csharp':     {'repo': 'creedengo-csharp',     'lang': 'cs'},
          }
          repos, langs = [], []
          for pk in plugins:
              info = catalog.get(pk, {})
              if info:
                  repos.append(info['repo'])
                  langs.append(info['lang'])
          print(','.join(repos))
          print(','.join(langs))
          " > /tmp/repos_langs.txt

          ALL_REPOS=$(sed -n '1p' /tmp/repos_langs.txt)
          ALL_LANGS=$(sed -n '2p' /tmp/repos_langs.txt)
          echo "ALL_SONAR_REPOS=$ALL_REPOS" >> $GITHUB_ENV
          echo "ALL_SONAR_LANGS=$ALL_LANGS" >> $GITHUB_ENV

          IFS=',' read -ra REPOS <<< "$ALL_REPOS"
          IFS=',' read -ra LANGS <<< "$ALL_LANGS"
          for i in "${!REPOS[@]}"; do
            repo="${REPOS[$i]}"; lang="${LANGS[$i]}"
            [ -z "$repo" ] && continue
            PK=$(curl -s $AUTH_FLAG \
              "${SONAR_URL}/api/qualityprofiles/search?language=${lang}&defaults=true" 2>/dev/null \
              | python3 -c "import sys,json; ps=json.load(sys.stdin).get('profiles',[]); print(ps[0]['key'] if ps else '')" 2>/dev/null || echo "")
            if [ -n "$PK" ]; then
              curl -s -o /dev/null $AUTH_FLAG -X POST \
                "${SONAR_URL}/api/qualityprofiles/activate_rules" \
                -d "targetKey=${PK}&repositories=${repo}" 2>/dev/null || true
              echo "✅ ${repo} rules activated (lang: ${lang})"
            fi
          done

      - name: Run SonarQube analysis
        if: env.CREEDENGO_SKIP != 'true'
        run: |
          cd backend
          SONAR_AUTH=""
          if [ -n "${SONAR_TOKEN:-}" ]; then
            SONAR_AUTH="-Dsonar.token=${SONAR_TOKEN}"
          else
            SONAR_AUTH="-Dsonar.login=${SONAR_USER:-admin} -Dsonar.password=${SONAR_PASSWORD:-admin}"
          fi

          # Auto-detect Java version from detection
          JAVA_VER=$(echo "$DETECT_JSON" | python3 -c "
          import sys, json
          for m in json.load(sys.stdin)['modules']:
              if m['language'] == 'java' and m['language_version']:
                  print(m['language_version']); break
          " 2>/dev/null || echo "21")

          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.host.url=http://localhost:9100 \
            $SONAR_AUTH \
            -Dsonar.projectKey=esign-payment-backend \
            -Dsonar.projectName="ESign Payment Backend" \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.java.source=${JAVA_VER} \
            -Dsonar.sourceEncoding=UTF-8 \
            -DskipTests 2>&1 | grep -E "ANALYSIS SUCCESSFUL|ERROR|WARN|Sensor creedengo|Creedengo" || true

      - name: Wait for analysis completion
        if: env.CREEDENGO_SKIP != 'true'
        run: |
          AUTH_FLAG=""
          if [ -n "${SONAR_TOKEN:-}" ]; then AUTH_FLAG="-u ${SONAR_TOKEN}:"; else AUTH_FLAG="-u ${SONAR_USER:-admin}:${SONAR_PASSWORD:-admin}"; fi

          for i in $(seq 1 60); do
            CE_STATUS=$(curl -s $AUTH_FLAG \
              "http://localhost:9100/api/ce/component?component=esign-payment-backend" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('current',{}).get('status','PENDING'))" 2>/dev/null || echo "PENDING")
            if [ "$CE_STATUS" = "SUCCESS" ]; then
              echo "✅ Analysis complete"
              break
            elif [ "$CE_STATUS" = "FAILED" ]; then
              echo "❌ Analysis failed"
              exit 1
            fi
            sleep 2
          done

      - name: Extract Creedengo results
        if: env.CREEDENGO_SKIP != 'true'
        run: |
          mkdir -p reports

          PRIMARY_LANG=$(echo "$DETECT_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['primary_language'])" 2>/dev/null || echo "java")

          EXTRACT_ARGS="--sonar-url http://localhost:9100 --project-key esign-payment-backend --output reports/creedengo-report.json --appname ${{ github.event.repository.name || 'esignpayment' }} --language ${PRIMARY_LANG} --sonar-repos ${ALL_SONAR_REPOS:-creedengo-java}"
          if [ -n "${SONAR_TOKEN:-}" ]; then
            EXTRACT_ARGS="$EXTRACT_ARGS --sonar-token ${SONAR_TOKEN}"
          else
            EXTRACT_ARGS="$EXTRACT_ARGS --sonar-user ${SONAR_USER:-admin} --sonar-password ${SONAR_PASSWORD:-admin}"
          fi
          python3 scripts/creedengo-extract-results.py $EXTRACT_ARGS

          # Embed detection metadata
          python3 -c "
          import json, os
          detect_json = os.environ.get('DETECT_JSON', '{}')
          detect = json.loads(detect_json) if detect_json else {}
          report = json.load(open('reports/creedengo-report.json'))
          if detect:
              report['detection'] = {
                  'languages': detect.get('languages', []),
                  'primary_language': detect.get('primary_language', ''),
                  'primary_framework': detect.get('primary_framework', ''),
                  'plugins_used': detect.get('creedengo_plugins', []),
                  'modules': [{'name':m['name'],'path':m['path'],'language':m['language'],
                               'framework':m.get('framework',''),'framework_version':m.get('framework_version',''),
                               'language_version':m.get('language_version','')} for m in detect.get('modules',[])],
              }
              json.dump(report, open('reports/creedengo-report.json','w'), indent=2, ensure_ascii=False)
              print('✅ Detection metadata embedded')
          " || true

      - name: Assertions — Creedengo
        run: |
          set -e
          REPORT="reports/creedengo-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "❌ Creedengo report not found"
            exit 1
          fi

          echo "=== Creedengo Report Summary ==="
          python3 -c "
          import json
          r = json.load(open('$REPORT'))
          score = r.get('creedengo_score', {})
          print(f'Score: {score.get(\"total\", 0)}/100  Grade: {score.get(\"grade\", \"?\")}')
          print(f'Issues: {score.get(\"issues_count\", 0)}')
          bd = score.get('severity_breakdown', {})
          for sev in ['BLOCKER','CRITICAL','MAJOR','MINOR','INFO']:
              count = bd.get(sev, 0)
              if count > 0:
                  print(f'  {sev}: {count}')
          print(f'Rules violated: {r.get(\"rules_violated\", 0)}/{r.get(\"all_creedengo_rules\", 0)}')
          "

          TOTAL=$(python3 -c "import json;print(json.load(open('$REPORT')).get('creedengo_score',{}).get('total',0))")
          GRADE=$(python3 -c "import json;print(json.load(open('$REPORT')).get('creedengo_score',{}).get('grade','?'))")
          ISSUES=$(python3 -c "import json;print(json.load(open('$REPORT')).get('creedengo_score',{}).get('issues_count',0))")

          echo "## 🌱 Creedengo Score: ${TOTAL}/100 (Grade: ${GRADE}) — ${ISSUES} issues" >> $GITHUB_STEP_SUMMARY


      - name: Upload Creedengo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: creedengo-report
          path: reports/creedengo-report.json

      - name: Stop SonarQube
        if: always()
        run: docker rm -f creedengo-sonar 2>/dev/null || true

  spectral-lint:
    name: "🔬 Spectral OpenAPI Lint"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/
      - name: Start backend
        run: |
          nohup java -jar backend/target/*.jar \
            --spring.profiles.active=test \
            --server.port=8080 \
            > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 90); do
            curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1 && echo "Backend up" && break
            sleep 2
          done
      - name: Fetch OpenAPI spec
        run: curl -s http://localhost:8080/api/v3/api-docs -o openapi.json
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Run Spectral
        run: |
          if [ -f .spectral.yml ]; then
            spectral lint openapi.json --ruleset .spectral.yml --format stylish || true
          else
            echo "No .spectral.yml found — running with default rules"
            spectral lint openapi.json --format stylish || true
          fi
      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) 2>/dev/null || true

  auto-discover:
    name: "🔍 Auto-Discover Analysis"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/
      - name: Start backend
        run: |
          nohup java -jar backend/target/*.jar \
            --spring.profiles.active=test \
            --server.port=8080 \
            > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 90); do
            curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done
      - name: Run Auto-Discover Analyzer
        run: |
          python3 scripts/green-api-auto-discover.py \
            --target http://localhost:8080 \
            --swagger http://localhost:8080/api/v3/api-docs \
            --repeat 3
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-discover-report
          path: reports/
      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) 2>/dev/null || true

  summary:
    name: "📊 Combined Green Summary"
    needs: [green-score, creedengo]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Green Score report
        uses: actions/download-artifact@v4
        with:
          name: green-score-report
          path: reports/
        continue-on-error: true
      - name: Download Creedengo report
        uses: actions/download-artifact@v4
        with:
          name: creedengo-report
          path: reports/
        continue-on-error: true
      - name: Generate combined summary
        run: |
          echo "# 🌿 Green API — Combined Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Green Score
          if [ -f reports/latest-report.json ]; then
            python3 -c "
          import json
          raw = json.load(open('reports/latest-report.json'))
          rpt = raw.get('report', raw)
          gs = rpt.get('green_score', {})
          total = gs.get('total', 0)
          grade = gs.get('grade', '?')
          disc = rpt.get('auto_discovery', {})
          ep = disc.get('endpoints_discovered', 0)
          emoji = '🟢' if total >= 80 else '🟡' if total >= 50 else '🔴'
          print(f'## {emoji} Green API Score: **{total}/100** (Grade: **{grade}**)')
          print(f'')
          print(f'- Endpoints découverts : **{ep}**')
          bd = gs.get('breakdown', {})
          if bd:
              print(f'')
              print(f'| Règle | Score | Max |')
              print(f'|-------|------:|----:|')
              labels = {'DE11_pagination':'DE11 Pagination','DE08_fields':'DE08 Filtrage','DE01_compression':'DE01 Compression','DE02_DE03_cache':'DE02/03 Cache','DE06_delta':'DE06 Delta','range_206':'206 Range','LO01_observability':'LO01 Observabilité','US07_rate_limit':'US07 Rate Limit','AR02_format_cbor':'AR02 CBOR'}
              maxs = {'DE11_pagination':15,'DE08_fields':15,'DE01_compression':15,'DE02_DE03_cache':15,'DE06_delta':10,'range_206':10,'LO01_observability':5,'US07_rate_limit':5,'AR02_format_cbor':10}
              for k, lbl in labels.items():
                  s = bd.get(k, 0)
                  mx = maxs.get(k, 0)
                  icon = '✅' if s >= mx else '⚠️' if s > 0 else '❌'
                  print(f'| {icon} {lbl} | {s} | {mx} |')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Green Score report non disponible" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Creedengo
          if [ -f reports/creedengo-report.json ]; then
            python3 -c "
          import json
          r = json.load(open('reports/creedengo-report.json'))
          s = r.get('creedengo_score', {})
          total = s.get('total', 0)
          grade = s.get('grade', '?')
          issues = s.get('issues_count', 0)
          violated = r.get('rules_violated', 0)
          analyzed = r.get('all_creedengo_rules', 0)
          emoji = '🟢' if total >= 85 else '🟡' if total >= 70 else '🔴'
          print(f'## {emoji} 🌱 Creedengo Éco-Design: **{total}/100** (Grade: **{grade}**)')
          print(f'')
          print(f'- Issues : **{issues}**')
          print(f'- Règles violées : **{violated}** / {analyzed}')
          bd = s.get('severity_breakdown', {})
          icons = {'BLOCKER':'🔴','CRITICAL':'🟠','MAJOR':'🟡','MINOR':'⚪','INFO':'🔵'}
          parts = [f'{icons.get(sv,\"⚪\")} {sv}: {c}' for sv, c in bd.items() if c > 0]
          if parts:
              print(f'- Sévérités : {\" | \".join(parts)}')
          effort = s.get('total_effort', '')
          if effort:
              print(f'- Effort de remédiation : **{effort}**')
          rules = r.get('rules_summary', [])
          if rules:
              print(f'')
              print(f'| Sévérité | Règle | Issues |')
              print(f'|:--------:|-------|-------:|')
              for rl in rules[:10]:
                  sv = rl.get('severity','INFO')
                  short = rl['key'].split(':')[-1] if ':' in rl['key'] else rl['key']
                  print(f'| {icons.get(sv,\"⚪\")} {sv} | **{short}** — {rl[\"name\"]} | {rl[\"count\"]} |')
              if len(rules) > 10:
                  print(f'| | *… et {len(rules)-10} autres* | |')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Creedengo report non disponible" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📅 *$(date -u +%Y-%m-%dT%H:%M:%SZ)*" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with combined score
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🌿 Green API — Combined Report\n\n';

            // Green Score
            if (fs.existsSync('reports/latest-report.json')) {
              const raw = JSON.parse(fs.readFileSync('reports/latest-report.json', 'utf8'));
              const rpt = raw.report || raw;
              const gs = rpt.green_score || {};
              const disc = rpt.auto_discovery || {};
              const emoji = gs.total >= 80 ? '🟢' : gs.total >= 50 ? '🟡' : '🔴';
              body += `### ${emoji} Green API Score: **${gs.total}/100** (Grade: **${gs.grade}**)\n`;
              body += `🔍 Endpoints: **${disc.endpoints_discovered || 0}**\n\n`;
            }

            // Creedengo
            if (fs.existsSync('reports/creedengo-report.json')) {
              const cr = JSON.parse(fs.readFileSync('reports/creedengo-report.json', 'utf8'));
              const cs = cr.creedengo_score || {};
              const emoji2 = cs.total >= 85 ? '🟢' : cs.total >= 70 ? '🟡' : '🔴';
              body += `### ${emoji2} 🌱 Creedengo Éco-Design: **${cs.total}/100** (Grade: **${cs.grade}**)\n`;
              body += `🐛 Issues: **${cs.issues_count || 0}** | Règles violées: **${cr.rules_violated || 0}**\n\n`;
              const rules = cr.rules_summary || [];
              if (rules.length > 0) {
                const sevIcons = { BLOCKER: '🔴', CRITICAL: '🟠', MAJOR: '🟡', MINOR: '⚪', INFO: '🔵' };
                body += `<details><summary>📋 Top règles Creedengo (${rules.length})</summary>\n\n`;
                body += `| Sévérité | Règle | Issues |\n|---|---|---|\n`;
                for (const r of rules.slice(0, 15)) {
                  const k = r.key.includes(':') ? r.key.split(':')[1] : r.key;
                  body += `| ${sevIcons[r.severity] || '⚪'} ${r.severity} | **${k}** — ${r.name} | ${r.count} |\n`;
                }
                body += `\n</details>\n\n`;
              }
            }

            body += `📅 *${new Date().toISOString()}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  deploy-pages:
    name: "🌐 Deploy Dashboard to GitHub Pages"
    needs: [green-score, creedengo]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/devoxx')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: green-score-dashboard
          path: dashboard/

      - name: Download badge artifact
        uses: actions/download-artifact@v4
        with:
          name: green-score-badge
          path: badges/

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: green-score-report
          path: reports/

      - name: Download Creedengo report
        uses: actions/download-artifact@v4
        with:
          name: creedengo-report
          path: reports/
        continue-on-error: true

      - name: Regenerate dashboard with Creedengo data
        run: |
          if [ -f reports/creedengo-report.json ]; then
            echo "🌱 Creedengo report found — regenerating dashboard with eco-design data"
            chmod +x scripts/generate-dashboard.sh
            bash scripts/generate-dashboard.sh \
              reports/latest-report.json \
              dashboard/index.save.html \
              dashboard/index.html \
              reports/creedengo-report.json || true
          else
            echo "ℹ️ No Creedengo report found — dashboard without eco-design tab"
          fi

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp -r dashboard/* _site/
          cp -r badges _site/badges
          cp -r reports _site/reports
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

