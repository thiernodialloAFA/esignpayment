name: "🌿 Green API Score CI"

on:
  push:
    branches: [main, master, develop, feat/devoxx]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pr-green-api-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  build:
    name: "🔨 Build Backend "
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build backend
        run: mvn -q -DskipTests -f backend/pom.xml package
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  green-score:
    name: "🌿 Green Score Analysis"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/
      - name: Start backend (H2 in-memory, no Keycloak)
        run: |
          nohup java -jar backend/target/*.jar \
            --spring.datasource.url='jdbc:h2:mem:greentest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL' \
            --spring.datasource.driver-class-name=org.h2.Driver \
            --spring.datasource.username=sa \
            --spring.datasource.password= \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.flyway.enabled=false \
            --spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://localhost:9090/dummy \
            --management.tracing.sampling.probability=0 \
            --server.port=8080 \
            > backend.log 2>&1 &
          echo $! > backend.pid
      - name: Wait for backend
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 90); do
            if curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "✅ Backend is up"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "❌ Backend failed to start"
              cat backend.log
              exit 1
            fi
            sleep 2
          done
      - name: Verify Swagger is exposed
        run: |
          echo "Checking Swagger endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v3/api-docs)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Swagger spec available at /api/v3/api-docs"
            curl -s http://localhost:8080/api/v3/api-docs | python3 -c "
          import sys, json
          spec = json.load(sys.stdin)
          paths = list(spec.get('paths', {}).keys())
          print(f'  OpenAPI version: {spec.get(\"openapi\", \"?\")}')
          print(f'  Title: {spec.get(\"info\", {}).get(\"title\", \"?\")}')
          print(f'  Endpoints: {len(paths)}')
          for p in paths[:10]:
              print(f'    {p}')
          if len(paths) > 10:
              print(f'    ... and {len(paths) - 10} more')
          "
          else
            echo "❌ Swagger not available (HTTP $STATUS)"
            cat backend.log | tail -50
            exit 1
          fi

      - name: Run Green API Auto-Discover Analyzer
        run: |
          python3 scripts/green-api-auto-discover.py \
            --target http://localhost:8080 \
            --swagger http://localhost:8080/api/v3/api-docs \
            --repeat 3 \
            --skip-spectral

      - name: Generate Green Score badge
        run: |
          chmod +x scripts/generate-badge.sh
          bash scripts/generate-badge.sh reports/latest-report.json badges/green-score.svg || true

      - name: Generate Dashboard
        run: |
          chmod +x scripts/generate-dashboard.sh
          bash scripts/generate-dashboard.sh reports/latest-report.json dashboard/index.save.html dashboard/index.html || true

      - name: Assertions — Green Score
        shell: bash
        run: |
          set -e
          REPORT="reports/latest-report.json"

          if [ ! -f "$REPORT" ]; then
            echo "❌ ERROR: Report file not found: $REPORT"
            ls -la reports/ || true
            exit 1
          fi
          if [ ! -s "$REPORT" ]; then
            echo "❌ ERROR: Report file is empty"
            exit 1
          fi

          echo "=== Green Score Report ==="
          python3 -m json.tool "$REPORT" | head -40

          TOTAL=$(python3 -c "import json;print(json.load(open('$REPORT'))['green_score']['total'])")
          GRADE=$(python3 -c "import json;print(json.load(open('$REPORT'))['green_score']['grade'])")
          EP_COUNT=$(python3 -c "import json;r=json.load(open('$REPORT'));print(r.get('auto_discovery',{}).get('endpoints_discovered',0))")

          echo "## 🌿 Green Score: ${TOTAL}/100 (Grade: ${GRADE})" >> $GITHUB_STEP_SUMMARY
          echo "Endpoints discovered: ${EP_COUNT}" >> $GITHUB_STEP_SUMMARY

          # Assert endpoints were discovered from Swagger
          python3 -c "
          import json
          r = json.load(open('$REPORT'))
          ep = r.get('auto_discovery', {}).get('endpoints_discovered', 0)
          assert ep > 0, f'FAIL: no endpoints discovered (got {ep})'
          print(f'✅ Discovered {ep} endpoints from Swagger')
          "

          # Assert Green Score is reasonable (>= 5, meaning at least actuator/health works)
          python3 -c "
          total = $TOTAL
          assert total >= 5, f'FAIL: Green Score {total} < 5'
          print(f'✅ Green Score {total}/100 — PASSED')
          "

          # Regression gate (optional)
          if [ -f green-score-threshold.json ]; then
            MIN_SCORE=$(python3 -c "import json;print(json.load(open('green-score-threshold.json'))['minScore'])")
            echo "Min score threshold: ${MIN_SCORE}" >> $GITHUB_STEP_SUMMARY
            python3 -c "total=$TOTAL; minimum=$MIN_SCORE; assert total >= minimum, f'FAIL: Green Score {total} < threshold {minimum}'; print('✅ Green Score threshold PASSED')"
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: green-score-report
          path: reports/

      - name: Upload badge
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: green-score-badge
          path: badges/

      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: green-score-dashboard
          path: |
            dashboard/index.html
            dashboard/index.md

      - name: Comment PR with Green Score
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('reports/latest-report.json', 'utf8'));
            const gs = report.green_score;
            const disc = report.auto_discovery || {};
            const emoji = gs.total >= 80 ? '🟢' : gs.total >= 50 ? '🟡' : '🔴';

            let body = `## ${emoji} Green API Score: **${gs.total}/100** (Grade: **${gs.grade}**)\n\n`;
            body += `🔍 Endpoints discovered from Swagger: **${disc.endpoints_discovered || 0}**\n\n`;
            body += `| Règle | Score | Max |\n|---|---|---|\n`;

            const labels = {
              'DE11_pagination': 'DE11 Pagination',
              'DE08_fields': 'DE08 Filtrage champs',
              'DE01_compression': 'DE01 Compression',
              'DE02_DE03_cache': 'DE02/03 Cache ETag',
              'DE06_delta': 'DE06 Delta',
              'range_206': '206 Range',
              'LO01_observability': 'LO01 Observabilité',
              'US07_rate_limit': 'US07 Rate Limit',
              'AR02_format_cbor': 'AR02 CBOR',
            };
            const maxScores = {
              DE11_pagination: 15, DE08_fields: 15, DE01_compression: 15,
              DE02_DE03_cache: 15, DE06_delta: 10, range_206: 10,
              LO01_observability: 5, US07_rate_limit: 5, AR02_format_cbor: 10
            };

            for (const [key, label] of Object.entries(labels)) {
              const score = gs.breakdown[key] || 0;
              const max = maxScores[key] || 0;
              const icon = score >= max * 0.75 ? '✅' : score >= max * 0.4 ? '⚠️' : '❌';
              body += `| ${icon} ${label} | ${score} | ${max} |\n`;
            }

            if (disc.discovered_endpoints && disc.discovered_endpoints.length > 0) {
              body += `\n<details><summary>📋 Discovered Endpoints (${disc.discovered_endpoints.length})</summary>\n\n`;
              body += `| Method | Path | Status | Size |\n|---|---|---|---|\n`;
              for (const ep of disc.discovered_endpoints.slice(0, 30)) {
                body += `| ${ep.method} | \`${ep.path}\` | ${ep.http_code} | ${ep.size_download} B |\n`;
              }
              body += `\n</details>\n`;
            }

            body += `\n📅 *${report.timestamp}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: backend.log

      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) 2>/dev/null || true

  spectral-lint:
    name: "🔬 Spectral OpenAPI Lint"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/
      - name: Start backend
        run: |
          nohup java -jar backend/target/*.jar \
            --spring.datasource.url='jdbc:h2:mem:linttest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL' \
            --spring.datasource.driver-class-name=org.h2.Driver \
            --spring.datasource.username=sa \
            --spring.datasource.password= \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.flyway.enabled=false \
            --spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://localhost:9090/dummy \
            --management.tracing.sampling.probability=0 \
            --server.port=8080 \
            > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 90); do
            curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1 && echo "Backend up" && break
            sleep 2
          done
      - name: Fetch OpenAPI spec
        run: curl -s http://localhost:8080/api/v3/api-docs -o openapi.json
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Run Spectral
        run: |
          if [ -f .spectral.yml ]; then
            spectral lint openapi.json --ruleset .spectral.yml --format stylish || true
          else
            echo "No .spectral.yml found — running with default rules"
            spectral lint openapi.json --format stylish || true
          fi
      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) 2>/dev/null || true

  auto-discover:
    name: "🔍 Auto-Discover Analysis"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/
      - name: Start backend
        run: |
          nohup java -jar backend/target/*.jar \
            --spring.datasource.url='jdbc:h2:mem:discovertest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL' \
            --spring.datasource.driver-class-name=org.h2.Driver \
            --spring.datasource.username=sa \
            --spring.datasource.password= \
            --spring.jpa.hibernate.ddl-auto=create-drop \
            --spring.flyway.enabled=false \
            --spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://localhost:9090/dummy \
            --management.tracing.sampling.probability=0 \
            --server.port=8080 \
            > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 90); do
            curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1 && echo "API ready" && break
            sleep 2
          done
      - name: Run Auto-Discover Analyzer
        run: |
          python3 scripts/green-api-auto-discover.py \
            --target http://localhost:8080 \
            --swagger http://localhost:8080/api/v3/api-docs \
            --repeat 3
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-discover-report
          path: reports/
      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) 2>/dev/null || true

  deploy-pages:
    name: "🌐 Deploy Dashboard to GitHub Pages"
    needs: green-score
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: green-score-dashboard
          path: dashboard/

      - name: Download badge artifact
        uses: actions/download-artifact@v4
        with:
          name: green-score-badge
          path: badges/

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: green-score-report
          path: reports/

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp -r dashboard/* _site/
          cp -r badges _site/badges
          cp -r reports _site/reports
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

