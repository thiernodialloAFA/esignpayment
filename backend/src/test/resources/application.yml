spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 1025

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/esignpayment
          jwk-set-uri: http://localhost:9090/realms/esignpayment/protocol/openid-connect/certs

stripe:
  api-key: sk_test_placeholder
  webhook-secret: whsec_placeholder
  publishable-key: pk_test_placeholder

twilio:
  account-sid: AC_placeholder
  auth-token: placeholder
  phone-number: "+15005550006"

management:
  tracing:
    sampling:
      probability: 0.0

app:
  frontend-url: http://localhost:3000
  ocr:
    enabled: true
    languages: fra+eng

